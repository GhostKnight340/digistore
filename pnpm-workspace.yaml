# pnpm dependency build-script policy.
#
# pnpm (v10+) does NOT run a dependency's install/postinstall scripts unless it
# is explicitly approved here — a supply-chain safeguard. `allowBuilds` is a
# per-package decision map (true = run its scripts, false = never run them). An
# undecided package makes `pnpm install` fail with ERR_PNPM_IGNORED_BUILDS, so
# every package that HAS a build script must appear below with a decision.
#
# Policy: this project deliberately runs NO dependency build scripts. Every
# package that has one ships prebuilt binaries as optional dependencies
# (sharp -> @img/sharp-*, esbuild -> @esbuild/*, unrs-resolver -> napi binaries)
# or is generated explicitly at build time (`prisma generate` in package.json),
# so none of these scripts are actually needed. Keeping them off is the smaller
# attack surface and matches how the app already builds and deploys.
allowBuilds:
  '@prisma/client': false # client is generated by `prisma generate` (build script)
  '@prisma/engines': false # query-engine binaries fetched by `prisma generate`
  prisma: false # CLI; nothing to build on install
  esbuild: false # binary resolved from the @esbuild/<platform> optional dep
  sharp: false # binary resolved from the @img/sharp-<platform> optional dep
  unrs-resolver: false # napi binary resolved from its optional deps (lint tooling)
  # @sentry/cli downloads the sentry-cli binary, used ONLY for build-time
  # source-map upload — which is itself disabled unless SENTRY_AUTH_TOKEN is set
  # (see next.config.mjs: `sourcemaps.disable = !SENTRY_AUTH_TOKEN`). The app has
  # been building without it, so it stays off. If you enable source-map upload
  # (set SENTRY_AUTH_TOKEN in the prod build env), flip this to `true`.
  '@sentry/cli': false

# Added by pnpm: the Composio install pulled in newer AI-SDK packages that fall
# under this repo's minimum-release-age gate; these are the reviewed exclusions.
minimumReleaseAgeExclude:
  - '@ai-sdk/anthropic@4.0.18'
  - '@ai-sdk/gateway@4.0.26'
  - ai@7.0.34
  - postcss@8.5.10
  - undici@6.27.0
  - brace-expansion@1.1.16 || 5.0.7
  - js-yaml@4.3.0
  - fast-uri@3.1.4
  - sharp@0.35.0

overrides:
  brace-expansion@<1.1.16: ^1.1.16
  brace-expansion@>=3.0.0 <5.0.7: ^5.0.7
  fast-uri@>=3.0.0 <=3.1.3: ^3.1.4
  js-yaml@>=4.0.0 <4.3.0: ^4.3.0
  postcss@<8.5.10: ^8.5.10
  sharp@<0.35.0: ^0.35.0
  undici@<6.27.0: ^6.27.0
