<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width:1440px;height:920px;display:flex;background:#070809;border:1px solid rgba(255,255,255,0.09);border-radius:16px;overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,0.6)">

  <!-- ===== SIDEBAR ===== -->
  <aside style="width:248px;flex-shrink:0;background:#0C0D11;border-right:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;height:100%">
    <div style="height:60px;display:flex;align-items:center;gap:11px;padding:0 20px;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0">
      <div style="width:30px;height:30px;border-radius:8px;background:linear-gradient(145deg,#3E7BFA,#2B5FD9);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(62,123,250,0.35)">
        <div style="width:11px;height:11px;border:2px solid #fff;border-radius:3px"></div>
      </div>
      <div style="display:flex;flex-direction:column;line-height:1.1">
        <span style="font-size:15px;font-weight:600;letter-spacing:-0.01em">ghost.ma</span>
        <span style="font-size:11px;color:#646A77;font-family:'Geist Mono',monospace">admin</span>
      </div>
    </div>

    <nav ref="{{ setNavRef }}" style="flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:3px">
      <div data-nav="overview" style="display:flex;align-items:center;gap:11px;height:36px;padding:0 12px;border-radius:9px;font-size:13.5px;color:#9A9FAB;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"></rect><rect x="14" y="3" width="7" height="7" rx="1.5"></rect><rect x="3" y="14" width="7" height="7" rx="1.5"></rect><rect x="14" y="14" width="7" height="7" rx="1.5"></rect></svg>
        Overview
      </div>

      <div style="font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:#4d525d;padding:14px 12px 6px;font-weight:500">Catalogue</div>
      <div data-nav="products" style="display:flex;align-items:center;gap:11px;height:36px;padding:0 12px;border-radius:9px;font-size:13.5px;color:#9A9FAB;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><path d="M3.3 7L12 12l8.7-5M12 22V12"></path></svg>
        Products
      </div>
      <div data-nav="categories" style="display:flex;align-items:center;gap:11px;height:36px;padding:0 12px;border-radius:9px;font-size:13.5px;color:#9A9FAB;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
        Categories
      </div>
      <div data-nav="featured" style="display:flex;align-items:center;gap:11px;height:36px;padding:0 12px;border-radius:9px;font-size:13.5px;color:#9A9FAB;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 15.1 8.6 22 9.3 17 14.1 18.2 21 12 17.6 5.8 21 7 14.1 2 9.3 8.9 8.6 12 2"></polygon></svg>
        Featured
      </div>

      <div style="font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:#4d525d;padding:14px 12px 6px;font-weight:500">Orders</div>
      <div data-nav="orders" style="display:flex;align-items:center;gap:11px;height:36px;padding:0 12px;border-radius:9px;font-size:13.5px;color:#9A9FAB;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
        All orders
        <span style="margin-left:auto;font-size:11px;font-family:'Geist Mono',monospace;background:rgba(62,123,250,0.18);color:#7FA6FF;border-radius:6px;padding:1px 7px">7</span>
      </div>
      <div data-nav="payment" style="display:flex;align-items:center;gap:11px;height:36px;padding:0 12px;border-radius:9px;font-size:13.5px;color:#9A9FAB;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>
        Payment review
        <span style="margin-left:auto;font-size:11px;font-family:'Geist Mono',monospace;background:rgba(232,168,56,0.18);color:#E8A838;border-radius:6px;padding:1px 7px">3</span>
      </div>
      <div data-nav="fulfillment" style="display:flex;align-items:center;gap:11px;height:36px;padding:0 12px;border-radius:9px;font-size:13.5px;color:#9A9FAB;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="20 6 9 17 4 12"></polyline></svg>
        Fulfillment
      </div>
      <div data-nav="refunds" style="display:flex;align-items:center;gap:11px;height:36px;padding:0 12px;border-radius:9px;font-size:13.5px;color:#9A9FAB;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.5 15a9 9 0 1 0 2.1-9.4L1 10"></path></svg>
        Refunds
      </div>

      <div style="height:1px;background:rgba(255,255,255,0.06);margin:14px 8px"></div>
      <div data-nav="inventory" style="display:flex;align-items:center;gap:11px;height:36px;padding:0 12px;border-radius:9px;font-size:13.5px;color:#9A9FAB;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
        Inventory
      </div>
      <div data-nav="customers" style="display:flex;align-items:center;gap:11px;height:36px;padding:0 12px;border-radius:9px;font-size:13.5px;color:#9A9FAB;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.9"></path></svg>
        Customers
      </div>

      <div style="font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:#4d525d;padding:14px 12px 6px;font-weight:500">Settings</div>
      <div data-nav="settings" style="display:flex;align-items:center;gap:11px;height:36px;padding:0 12px;border-radius:9px;font-size:13.5px;color:#9A9FAB;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-2.82 1.17V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 8 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15H4.5a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 6 9.4l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 11 4.6V4.5a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 2.82 1.17l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 11h.1a2 2 0 0 1 0 4h-.1z"></path></svg>
        Store settings
      </div>
      <div data-nav="payments" style="display:flex;align-items:center;gap:11px;height:36px;padding:0 12px;border-radius:9px;font-size:13.5px;color:#9A9FAB;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="5" width="20" height="14" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg>
        Payment methods
      </div>
      <div data-nav="email" style="display:flex;align-items:center;gap:11px;height:36px;padding:0 12px;border-radius:9px;font-size:13.5px;color:#9A9FAB;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"></rect><path d="m22 7-10 5L2 7"></path></svg>
        Email templates
      </div>
      <div data-nav="supplier" style="display:flex;align-items:center;gap:11px;height:36px;padding:0 12px;border-radius:9px;font-size:13.5px;color:#9A9FAB;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1.5 1.5"></path><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1.5-1.5"></path></svg>
        Supplier API
      </div>
      <div data-nav="developer" style="display:flex;align-items:center;gap:11px;height:36px;padding:0 12px;border-radius:9px;font-size:13.5px;color:#9A9FAB;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
        Developer tools
      </div>
    </nav>

    <div style="padding:12px;border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0">
      <div style="display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;background:#121319;border:1px solid rgba(255,255,255,0.06)">
        <div style="width:30px;height:30px;border-radius:8px;background:linear-gradient(145deg,#2c3445,#171b26);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#9FB8FF">YB</div>
        <div style="flex:1;min-width:0;line-height:1.2">
          <div style="font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Younes B.</div>
          <div style="font-size:11px;color:#646A77">Owner</div>
        </div>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#646A77" stroke-width="2"><polyline points="18 15 12 9 6 15"></polyline></svg>
      </div>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <div style="flex:1;display:flex;flex-direction:column;min-width:0;height:100%">
    <!-- topbar -->
    <header style="height:60px;flex-shrink:0;display:flex;align-items:center;gap:16px;padding:0 22px;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(10,11,13,0.6);backdrop-filter:blur(12px)">
      <div style="flex:1;max-width:420px;display:flex;align-items:center;gap:10px;height:38px;padding:0 13px;background:#121319;border:1px solid rgba(255,255,255,0.08);border-radius:10px">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#646A77" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.6" y2="16.6"></line></svg>
        <input placeholder="Search or jump to…  orders, products, customers" style="flex:1;background:transparent;border:none;outline:none;color:#F3F4F7;font-size:13px">
        <span style="font-family:'Geist Mono',monospace;font-size:11px;color:#646A77;border:1px solid rgba(255,255,255,0.1);border-radius:5px;padding:1px 6px">⌘K</span>
      </div>
      <div style="flex:1"></div>
      <button style="height:36px;padding:0 13px;display:flex;align-items:center;gap:7px;border-radius:9px;border:1px solid rgba(255,255,255,0.1);background:#121319;color:#9A9FAB;font-size:13px;font-weight:500;cursor:pointer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
        View store
      </button>
      <button style="height:36px;padding:0 15px;display:flex;align-items:center;gap:7px;border-radius:9px;border:1px solid rgba(62,123,250,0.35);background:rgba(62,123,250,0.14);color:#9FB8FF;font-size:13px;font-weight:600;cursor:pointer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"></path></svg>
        Homepage Editor
      </button>
      <div style="display:flex;align-items:center;gap:7px;height:30px;padding:0 11px;border-radius:8px;background:rgba(46,160,103,0.12);border:1px solid rgba(46,160,103,0.28)">
        <span style="width:6px;height:6px;border-radius:50%;background:#2EA067;box-shadow:0 0 8px #2EA067"></span>
        <span style="font-size:11.5px;font-weight:500;color:#5BC98C;font-family:'Geist Mono',monospace">LIVE</span>
      </div>
    </header>

    <!-- content slot -->
    <div style="flex:1;min-height:0;overflow:hidden;position:relative">
      {{ children }}
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:920},&quot;active&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;overview&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;children&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;React.ReactNode&quot;}}">
class Component extends DCLogic {
  renderVals(){
    return { setNavRef: (n)=>{ this._nav = n; this.applyActive(); } };
  }
  componentDidUpdate(){ this.applyActive(); }
  applyActive(){
    if(!this._nav) return;
    const active = this.props.active || 'overview';
    this._nav.querySelectorAll('[data-nav]').forEach(el=>{
      const on = el.getAttribute('data-nav') === active;
      el.style.background = on ? 'rgba(62,123,250,0.13)' : 'transparent';
      el.style.color = on ? '#EAF0FF' : '#9A9FAB';
      el.style.fontWeight = on ? '600' : '400';
      el.style.boxShadow = on ? 'inset 0 0 0 1px rgba(62,123,250,0.20)' : 'none';
    });
  }
}
</script>
</body>
</html>
