<svg xmlns="http://www.w3.org/2000/svg" width="420" height="96" viewBox="0 0 420 96" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Ghost logo</title>
  <desc id="desc">Ghost wordmark using the existing website logo mark.</desc>
  <defs>
    <linearGradient id="ghost-mark-gradient" x1="20" y1="16" x2="76" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3E7BFA"/>
      <stop offset="1" stop-color="#2B5FD9"/>
    </linearGradient>
  </defs>
  <rect x="20" y="16" width="64" height="64" rx="16" fill="url(#ghost-mark-gradient)"/>
  <rect x="42" y="38" width="20" height="20" rx="5" stroke="#FFFFFF" stroke-width="4"/>
  <text x="108" y="62" fill="#F3F4F7" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="42" font-weight="650" letter-spacing="-1">Ghost</text>
</svg>
